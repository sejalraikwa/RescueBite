<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — RescueBite</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--green:#2d6a4f;--lime:#95d5b2;--cream:#fefae0;--earth:#b5838d;--dark:#1a1a1a;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}

    .auth-wrap{display:grid;grid-template-columns:1fr 1fr;min-height:620px;max-width:920px;width:100%;border-radius:28px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.15);}

    .auth-left{background:linear-gradient(150deg,#1a4030 0%,var(--green) 100%);padding:3.5rem;display:flex;flex-direction:column;justify-content:space-between;color:#fff;position:relative;overflow:hidden;}
    .auth-left::after{content:'';position:absolute;bottom:-80px;right:-80px;width:240px;height:240px;background:rgba(149,213,178,.15);border-radius:50%;}
    .auth-logo{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;}
    .auth-logo span{color:var(--lime);}
    .auth-headline h2{font-family:'Fraunces',serif;font-size:2.1rem;font-weight:900;line-height:1.2;margin-bottom:.8rem;}
    .auth-headline h2 em{font-style:italic;color:var(--lime);}
    .auth-headline p{font-size:.9rem;opacity:.7;line-height:1.7;}
    .role-pills{display:flex;flex-direction:column;gap:.8rem;margin-top:2rem;}
    .role-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:.8rem 1.1rem;display:flex;align-items:center;gap:.8rem;cursor:pointer;transition:background .2s;}
    .role-pill.active,.role-pill:hover{background:rgba(149,213,178,.2);border-color:var(--lime);}
    .role-pill span:first-child{font-size:1.4rem;}
    .rp-info strong{display:block;font-size:.88rem;font-weight:600;}
    .rp-info small{font-size:.75rem;opacity:.65;}
    .auth-left-footer{font-size:.78rem;opacity:.5;position:relative;z-index:1;}

    .auth-right{background:#fff;padding:3.5rem;overflow-y:auto;}
    .auth-right h3{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;color:var(--dark);margin-bottom:.4rem;}
    .auth-right .sub{font-size:.9rem;color:#888;margin-bottom:2rem;}
    .auth-right .sub a{color:var(--green);text-decoration:none;font-weight:500;}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-group{margin-bottom:1.2rem;}
    label{display:block;font-size:.82rem;font-weight:500;color:#555;margin-bottom:.45rem;}
    input,select{width:100%;padding:.85rem 1.1rem;border:1.5px solid #e2e8f0;border-radius:12px;font-size:.95rem;font-family:'DM Sans',sans-serif;background:#fafafa;transition:border-color .2s,box-shadow .2s;outline:none;}
    input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,79,.12);background:#fff;}

    /* role toggle in form */
    .role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.3rem;}
    .role-btn{padding:.85rem;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;text-align:center;background:#fafafa;transition:all .2s;font-family:'DM Sans',sans-serif;font-size:.88rem;}
    .role-btn.active{border-color:var(--green);background:rgba(45,106,79,.07);color:var(--green);font-weight:600;}
    .role-btn span{display:block;font-size:1.5rem;margin-bottom:.3rem;}

    .btn-submit{width:100%;background:var(--green);color:#fff;border:none;padding:1rem;border-radius:12px;font-size:1rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:.5rem;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 18px rgba(45,106,79,.3);}
    .btn-submit:hover{background:#1f4d39;transform:translateY(-1px);}
    .btn-submit:disabled{background:#aaa;cursor:not-allowed;box-shadow:none;transform:none;}

    .msg{padding:.9rem 1.1rem;border-radius:10px;font-size:.88rem;margin-bottom:1rem;display:none;}
    .msg.error{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;display:block;}
    .msg.success{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;display:block;}

    @media(max-width:640px){.auth-wrap{grid-template-columns:1fr;}.auth-left{display:none;}.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="auth-wrap">
  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-logo">Rescue<span>Bite</span></div>
    <div>
      <div class="auth-headline">
        <h2>Join the <em>rescue</em> mission.</h2>
        <p>Pick your role and start making a difference today.</p>
      </div>
      <div class="role-pills">
        <div class="role-pill active" onclick="selectRole('donor')">
          <span>🏪</span>
          <div class="rp-info"><strong>Food Donor</strong><small>Post surplus food for pickup</small></div>
        </div>
        <div class="role-pill" onclick="selectRole('volunteer')">
          <span>🛵</span>
          <div class="rp-info"><strong>Volunteer</strong><small>Pick up & deliver food</small></div>
        </div>
      </div>
    </div>
    <div class="auth-left-footer">© 2025 RescueBite</div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <h3>Create Account</h3>
    <p class="sub">Already have one? <a href="login.html">Sign in →</a></p>

    <div class="msg" id="msg"></div>

    <!-- Role toggle (mirrors left panel) -->
    <div class="role-toggle">
      <button class="role-btn active" id="donorBtn" onclick="selectRole('donor')">
        <span>🏪</span>Food Donor
      </button>
      <button class="role-btn" id="volunteerBtn" onclick="selectRole('volunteer')">
        <span>🛵</span>Volunteer
      </button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Rohan"/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Sharma"/>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="+91 98765 43210"/>
    </div>

    <!-- Donor-only fields -->
    <div id="donorFields">
      <div class="form-group">
        <label>Organization / Restaurant Name</label>
        <input type="text" id="orgName" placeholder="e.g. Punjabi Tadka, Vijay Nagar"/>
      </div>
    </div>

    <!-- Volunteer-only fields (hidden by default) -->
    <div id="volunteerFields" style="display:none;">
      <div class="form-group">
        <label>Vehicle Type</label>
        <select id="vehicle">
          <option value="">Select vehicle</option>
          <option>Bicycle</option>
          <option>Scooter / Bike</option>
          <option>Car</option>
          <option>On foot</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Address / Area</label>
      <input type="text" id="address" placeholder="e.g. Palasia Square, Indore"/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password"/>
      </div>
    </div>

    <button class="register-btn" id="registerBtn" onclick="registerUser()">Create Account</button>
    <p id="message"></p>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     STEP 1: Paste YOUR Firebase config below
     ══════════════════════════════════════════════════════ -->
<script type="module" src="js/register.js">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAoeO9shwyTPeaiueZYAC9NBijaoCL8L0A",
  authDomain: "rescuebite-62aad.firebaseapp.com",
  projectId: "rescuebite-62aad",
  storageBucket: "rescuebite-62aad.firebasestorage.app",
  messagingSenderId: "462394806163",
  appId: "1:462394806163:web:d226e9a5df987886162266",
  measurementId: "G-QFL8SX6TXB"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentRole = 'donor';

  // Pre-select role from URL param  e.g. register.html?role=volunteer
  const urlRole = new URLSearchParams(window.location.search).get('role');
  if (urlRole) { window.selectRole(urlRole); }

  window.selectRole = function(role) {
    currentRole = role;
    // Left panel pills
    document.querySelectorAll('.role-pill').forEach((el,i) => {
      el.classList.toggle('active', (i===0 && role==='donor') || (i===1 && role==='volunteer'));
    });
    // Right panel buttons
    document.getElementById('donorBtn').classList.toggle('active', role==='donor');
    document.getElementById('volunteerBtn').classList.toggle('active', role==='volunteer');
    // Show/hide fields
    document.getElementById('donorFields').style.display   = role==='donor'     ? '' : 'none';
    document.getElementById('volunteerFields').style.display = role==='volunteer' ? '' : 'none';
  };

  window.handleRegister = async function() {
    const email   = document.getElementById('email').value.trim();
    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const first   = document.getElementById('firstName').value.trim();
    const last    = document.getElementById('lastName').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const btn     = document.getElementById('registerBtn');
    const msg     = document.getElementById('msg');

    msg.className = 'msg'; msg.textContent = '';

    if (!email||!pass||!first||!last) {
      msg.className='msg error'; msg.textContent='Please fill in all required fields.'; return;
    }
    if (pass.length < 6) {
      msg.className='msg error'; msg.textContent='Password must be at least 6 characters.'; return;
    }
    if (pass !== confirm) {
      msg.className='msg error'; msg.textContent='Passwords do not match.'; return;
    }

    btn.disabled=true; btn.textContent='Creating account…';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const uid  = cred.user.uid;

      // Build user profile document
      const userData = {
        uid, email, firstName: first, lastName: last,
        phone, address, role: currentRole,
        createdAt: serverTimestamp(),
      };
      if (currentRole==='donor') {
        userData.orgName = document.getElementById('orgName').value.trim();
      } else {
        userData.vehicle = document.getElementById('vehicle').value;
      }

      // Save to Firestore /users/{uid}
      await setDoc(doc(db, 'users', uid), userData);

      msg.className='msg success'; msg.textContent='Account created! Redirecting to your dashboard…';

      setTimeout(() => {
        window.location.href = currentRole === 'volunteer'
          ? 'volunteer-dashboard.html'
          : 'donor-dashboard.html';
      }, 1000);

    } catch(err) {
      btn.disabled=false; btn.textContent='Create Account';
      const map = {
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/invalid-email':        'Invalid email address.',
        'auth/weak-password':        'Password too weak.',
      };
      msg.className='msg error';
      msg.textContent = map[err.code] || 'Registration failed: ' + err.message;
    }
  };
</script>

</body>
</html>
